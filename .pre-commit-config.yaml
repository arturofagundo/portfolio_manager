# .pre-commit-config.yaml
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: python -m ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: python -m ruff format
        language: system
        types: [python]

      - id: basedpyright
        name: basedpyright
        entry: python -m basedpyright
        language: system
        types: [python]
        types: [python]
        pass_filenames: false
